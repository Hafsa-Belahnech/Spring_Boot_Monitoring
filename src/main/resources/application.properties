spring.application.name=spring-monitoring

management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.endpoint.metrics.enabled=true
management.endpoints.web.base-path=/actuator
management.info.env.enabled=true
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true

info.app.name=Spring Monitoring App
info.app.version=1.0.0
info.app.description= Monitoring & Logging Spring Boot
management.metrics.tags.application=${spring.application.name}

logging.level.root=INFO
logging.level.ma.fstg=DEBUG
logging.file.name=logs/application.log
logging.pattern.console=%d{HH:mm:ss} [%t] %-5level %logger{36} - %msg%n